name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libdbus-1-3 libfontconfig1 python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest qtpy PySide6 pythontk mayatk
          pip install -e . --no-deps

      - name: Run tests
        # mayatk installed because test_color_swatch imports it.
        # test_marking_menu_integration.py is skipped: it drives Qt button
        # press/release sequences via QTest, and Qt's offscreen platform
        # plugin doesn't propagate release events the same way a real
        # desktop does. xvfb-run was tried but PySide6 6.11 SIGABRTs during
        # pytest collection under it. These integration tests pass on
        # Windows local; the unit-level test_marking_menu.py tests still
        # run in CI. Track for follow-up when a CI-friendly Qt event
        # harness is available.
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest --tb=short -v test/ \
            --ignore=test/test_marking_menu_integration.py
