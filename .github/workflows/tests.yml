name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libdbus-1-3 libfontconfig1 xvfb python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest qtpy PySide6 pythontk mayatk
          pip install -e . --no-deps

      - name: Run tests
        # Some uitk tests (marking-menu integration) drive real Qt button-
        # release events that do not propagate correctly under the offscreen
        # platform. Use a real X server (xvfb) so events behave as on a real
        # desktop. mayatk is installed because test_color_swatch imports it.
        run: |
          xvfb-run -a pytest --tb=short -v test/
