name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libdbus-1-3 libfontconfig1 python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest qtpy PySide6 pythontk mayatk
          pip install -e . --no-deps

      - name: Run tests
        # mayatk installed because test_color_swatch imports it.
        # 3 marking-menu integration tests deselected: they exercise Qt button-
        # release event propagation which behaves differently under
        # QT_QPA_PLATFORM=offscreen than on a real desktop. xvfb-run was tried
        # but PySide6 6.11 SIGABRTs during pytest collection under it. These
        # tests pass locally on Windows; deselected pending a CI-friendly fix.
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest --tb=short -v test/ \
            --deselect test/test_marking_menu_integration.py::MarkingMenuInputScenarios::test_05_release_left_with_right_held_shows_right_menu \
            --deselect test/test_marking_menu_integration.py::MarkingMenuInputScenarios::test_06_release_right_with_left_held_shows_left_menu \
            --deselect test/test_marking_menu_integration.py::MarkingMenuInputScenarios::test_08_right_then_release_then_left
