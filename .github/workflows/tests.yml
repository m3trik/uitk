name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    # Backstop: a hung test step used to run to GitHub's 6h job cap with no
    # output (see the streamed tee + per-test --timeout below). Cap the job so a
    # hang fails in minutes, not hours.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libdbus-1-3 libfontconfig1 python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pin PySide6 to <6.11: 6.11 segfaults during pytest cleanup
          # AND mid-test on offscreen QPA (test_chip_set_drops_orphaned_tag
          # in test_switchboard_browser.py crashes inside menu.py eventFilter
          # when chip buttons are deleteLater()'d during processEvents()).
          # 6.10.x is the last stable line on the headless runner.
          pip install pytest pytest-timeout qtpy 'PySide6<6.11'
          # --no-cache-dir + --upgrade forces a fresh resolution from PyPI for
          # in-house deps. Without this, pip's wheel cache can return a stale
          # pythontk that lacks newly-shipped APIs (the canonical-module-path
          # logic), making CI fail on tests the editable uitk source expects
          # to work.
          pip install --no-cache-dir --upgrade pythontk mayatk
          pip install -e . --no-deps

      - name: Run tests
        # mayatk installed because several tests import stable mayatk symbols
        # (bridge slots, ui handler, marking menu, preset manager). Tests must
        # NOT import a mayatk symbol renamed/added in the *current* cascade —
        # CI runs against the last *published* mayatk, which publishes AFTER
        # uitk, so such a symbol won't exist yet (its tests belong in mayatk).
        # test_marking_menu_integration.py is skipped: it drives Qt button
        # press/release sequences via QTest, and Qt's offscreen platform
        # plugin doesn't propagate release events the same way a real
        # desktop does. xvfb-run was tried but PySide6 6.11 SIGABRTs during
        # pytest collection under it. These integration tests pass on
        # Windows local; the unit-level test_marking_menu.py tests still
        # run in CI.
        #
        # PySide6 + pytest can SIGSEGV during *exit cleanup* (after all
        # tests have already passed) due to Qt object teardown ordering.
        # We parse the summary line and ignore non-zero pytest exit if
        # the failure count is zero.
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          set +e
          # Stream via tee (not $(...) capture): a hang used to show NOTHING in
          # the log because output was buffered until pytest returned. With -v,
          # the last streamed line is the test that hung. --timeout dumps that
          # test's thread stacks and force-exits rather than hanging to the 6h
          # cap; 300s is far above any real per-test cost (full suite ~17m).
          pytest --tb=short -v --timeout=300 --timeout-method=thread test/ \
            --ignore=test/test_marking_menu_integration.py 2>&1 | tee pytest_out.txt
          RC=${PIPESTATUS[0]}
          OUTPUT=$(cat pytest_out.txt)
          FAILED=$(echo "$OUTPUT" | grep -oP '\d+(?= failed)' | head -1 || echo "0")
          PASSED=$(echo "$OUTPUT" | grep -oP '\d+(?= passed)' | head -1 || echo "0")
          FAILED=${FAILED:-0}
          PASSED=${PASSED:-0}
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi
          if [ "$PASSED" -eq 0 ]; then
            echo "::error::No tests passed (likely collection error)"
            exit 1
          fi
          if [ "$RC" -ne 0 ]; then
            echo "::warning::pytest exited with code $RC after $PASSED passing tests (PySide6+pytest cleanup SIGSEGV — known issue, not a test failure)"
          fi
          exit 0
